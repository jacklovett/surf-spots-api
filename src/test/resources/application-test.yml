# Test profile - for all integration tests
spring:
  datasource:
    # Use a dedicated test database to avoid mutating dev data.
    # In Docker, set SPRING_TEST_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres
    url: ${SPRING_TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_TEST_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_TEST_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      # Same Postgres as dev is often used (localhost:5432); keep pools small per JVM.
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update # Hibernate automatically updates schema
  flyway:
    enabled: false # Disable Flyway in tests

# Disable automatic seeding for all tests
app:
  seed:
    enabled: false


