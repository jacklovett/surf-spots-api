spring:
  profiles:
    # default (not active): Surefire sets spring.profiles.active=test; "active: dev" here
    # merges with that in some setups so both dev+test run and JDBC/seeding misbehave.
    default: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/surf_spots_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        default_schema: public
    show-sql: false  # Set to true or use logging.level.org.hibernate.SQL: DEBUG in dev to inspect SQL
  cache:
    type: simple
    cache-names:
      - regionLookup
  mail:
    host: smtp.scaleway.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
server:
  max-http-header-size: 16KB
  max-http-post-size: 50MB

# Full exception stack traces for WARN/ERROR (so logs show what actually broke)
logging:
  level:
    com.lovettj.surfspotsapi: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %logger{36} - %msg%n%rEx"

# Trusted browser origins (CORS, CSRF Origin filter, password-reset / email link trust).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://surf-spots-five.vercel.app}

# App-specific settings
app:
  auth:
    session-secret: ${SESSION_SECRET:}
  # Public web app origin (trip emails, invite links). No trailing slash.
  url: ${APP_URL:http://localhost:5173}
  # Browser-reachable API base for email action links (GET verify-email redirect). No trailing slash.
  public-api-base-url: ${APP_PUBLIC_API_URL:http://localhost:8080}
  email:
    # Full URL to masthead image (same asset as home hero: public/images/png/logo.png). Default: {app.url}/images/png/logo.png
    # Dev profile sets this to the API static copy so mail preview works without the frontend.
    logo-url: ${APP_EMAIL_LOGO_URL:}
  mapbox:
    access-token: ${MAPBOX_ACCESS_TOKEN:}
  mail:
    enabled: ${MAIL_ENABLED:true} # Set to false to disable email sending
    # Optional From header; use an address verified with your SMTP provider (e.g. Scaleway).
    from: ${MAIL_FROM:}
    # Inbox for contact form submissions
    contact-to: ${MAIL_CONTACT_TO:hello@surfspots.com}
  storage:
    s3:
      endpoint: ${SCW_ENDPOINT:https://s3.fr-par.scw.cloud}
      region: ${SCW_REGION:fr-par}
      bucket: ${S3_BUCKET:surf-spots-media}
      access-key: ${SCW_ACCESS_KEY:}
      secret-key: ${SCW_SECRET_KEY:}