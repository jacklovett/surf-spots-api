# Development profile - for local development
spring:
  datasource:
    hikari:
      # Keep dev predictable when several tools hit the same Postgres (Docker + host).
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: none # Rely on Flyway migrations for schema consistency (incl. check constraints)
  flyway:
    # Run migrations on every dev boot so the DB matches JPA (e.g. Docker stack + local `mvn`).
    # If multiple API processes share one DB and you hit Flyway checksum conflicts, use separate DBs or coordinate deploys.
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    # Capture outbound mail with Mailpit/MailHog: SMTP on 1025, UI on 8025 (see docker-compose.dev.yml).
    # In Docker, set SPRING_MAIL_HOST=mailpit so the API reaches the Mailpit container (not localhost).
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# App-specific settings
app:
  auth:
    session-secret: ${SESSION_SECRET:SECRET}
  email:
    # Dev profile: serve masthead hero logo from API so mail preview works without the frontend.
    logo-url: http://localhost:${server.port:8080}/email/logo.png
  mail:
    # Default off. Set MAIL_ENABLED=true (e.g. in .env) to send through Mailpit in docker-compose.dev.yml.
    enabled: ${MAIL_ENABLED:false}
  storage:
    s3:
      endpoint: ${SCW_ENDPOINT:https://s3.fr-par.scw.cloud}
      region: ${SCW_REGION:fr-par}
      bucket: ${S3_BUCKET:surf-spots-media}
      access-key: ${SCW_ACCESS_KEY:}
      secret-key: ${SCW_SECRET_KEY:}

