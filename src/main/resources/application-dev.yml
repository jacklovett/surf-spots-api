# Development profile - for local development
spring:
  datasource:
    hikari:
      # Keep dev predictable when several tools hit the same Postgres (Docker + host).
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: none # Rely on Flyway migrations for schema consistency (incl. check constraints)
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    # Disable email sending in development - emails will be logged instead
    host: localhost
    port: 1025 # Use a mock SMTP server like MailHog or just disable
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# App-specific settings
app:
  mail:
    enabled: false # Set to true when you want to enable email in dev
  storage:
    s3:
      endpoint: ${SCW_ENDPOINT:https://s3.fr-par.scw.cloud}
      region: ${SCW_REGION:fr-par}
      bucket: ${S3_BUCKET:surf-spots-media}
      access-key: ${SCW_ACCESS_KEY:}
      secret-key: ${SCW_SECRET_KEY:}

