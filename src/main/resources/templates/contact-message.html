<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta name="color-scheme" content="light only">
    <title>New contact message</title>
</head>
<body style="margin:0;padding:0;background-color:#eef2f7;">
<div style="display:none;max-height:0;overflow:hidden;">New message via Surf Spots contact form.</div>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#eef2f7;">
    <tr>
        <td align="center" style="padding:32px 14px 48px 14px;">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
                   style="max-width:560px;border-collapse:separate;border-spacing:0;border-radius:20px;overflow:hidden;
                          box-shadow:0 20px 50px rgba(13,22,25,0.12);">
                <tr>
                    <td th:insert="~{email/fragments :: masthead}"></td>
                </tr>
                <tr>
                    <td style="background-color:#ffffff;border:1px solid #dddddd;border-top:none;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                                <td style="padding:36px 30px 40px 30px;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#0d1619;">
                                    <p style="margin:0 0 6px 0;font-size:12px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#666666;">Inbox</p>
                                    <h1 style="margin:0 0 12px 0;font-size:26px;line-height:1.25;font-weight:700;letter-spacing:-0.02em;color:#333333;">New contact message</h1>
                                    <p style="margin:0 0 28px 0;font-size:16px;line-height:1.65;letter-spacing:0.02em;color:#666666;">
                                        Someone used the Surf Spots contact form. Reply to this email to respond directly to the sender.
                                    </p>
                                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-bottom:18px;">
                                        <tr>
                                            <td style="padding:10px 0;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#666666;width:88px;vertical-align:top;">From</td>
                                            <td style="padding:10px 0;font-size:16px;font-weight:600;color:#0d1619;" th:text="${name}">Name</td>
                                        </tr>
                                        <tr>
                                            <td style="padding:10px 0;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#666666;vertical-align:top;">Email</td>
                                            <td style="padding:10px 0;font-size:16px;">
                                                <a th:href="|mailto:${email}|" th:text="${email}" style="color:#046380;text-decoration:underline;">email</a>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td style="padding:10px 0;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#666666;vertical-align:top;">Subject</td>
                                            <td style="padding:10px 0;font-size:16px;font-weight:600;color:#0d1619;" th:text="${subject}">Subject</td>
                                        </tr>
                                    </table>
                                    <div style="border-radius:14px;border:1px solid #dddddd;background-color:#ffffff;padding:22px 22px;">
                                        <div style="font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#666666;margin-bottom:10px;">Message</div>
                                        <div th:text="${message}" style="font-size:16px;line-height:1.7;letter-spacing:0.02em;color:#0d1619;white-space:pre-wrap;">Message</div>
                                    </div>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
            <div th:insert="~{email/fragments :: footer}"></div>
        </td>
    </tr>
</table>
</body>
</html>
