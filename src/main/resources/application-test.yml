# Test profile - for running tests
spring:
  autoconfigure:
    exclude:
      # oauth2-client is on the classpath; no spring.security.oauth2.client.registration.* in tests.
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
  datasource:
    # Dedicated DB name so it is never confused with dev (surf_spots_db). Create once locally:
    #   psql -U postgres -h localhost -c "CREATE DATABASE surf_spots_test;"
    # SPRING_DATASOURCE_URL in .env overrides this; Maven Surefire sets spring.datasource.url to the same test DB.
    url: ${SPRING_TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/surf_spots_test}
    username: ${SPRING_TEST_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_TEST_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false # Disable Flyway in tests
  mail:
    # Disable email sending in tests
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# App-specific settings
app:
  auth:
    session-secret: test-session-secret
  seed:
    enabled: false
  mail:
    enabled: false # Disable email in tests
  storage:
    s3:
      endpoint: https://s3.fr-par.scw.cloud
      region: fr-par
      bucket: surf-spots-media
      access-key: test-access-key
      secret-key: test-secret-key

