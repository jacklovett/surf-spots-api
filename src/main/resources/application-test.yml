# Test profile - for running tests
spring:
  datasource:
    # Keep tests away from dev DB. Prefer setting SPRING_TEST_DATASOURCE_URL in environment.
    url: ${SPRING_TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_TEST_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_TEST_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false # Disable Flyway in tests
  mail:
    # Disable email sending in tests
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# App-specific settings
app:
  seed:
    enabled: false
  mail:
    enabled: false # Disable email in tests
  storage:
    s3:
      endpoint: https://s3.fr-par.scw.cloud
      region: fr-par
      bucket: surf-spots-media
      access-key: test-access-key
      secret-key: test-secret-key

